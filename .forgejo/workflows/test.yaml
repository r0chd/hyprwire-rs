name: Rust Tests
on:
  pull_request:
  push:
    branches:
      - master
jobs:
  test:
    name: Test and Lint
    runs-on: docker
    container:
      image: nixos/nix:2.22.1
    steps:
      - name: Install Node.js for Actions
        run: |
          nix-channel --update
          nix-env -iA nixpkgs.nodejs

      - name: Checkout code
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: Enable flakes
        run: |
          mkdir -p /etc/nix
          echo "experimental-features = nix-command flakes" >> /etc/nix/nix.conf

      - name: Run tests
        run: nix develop .#ci --command cargo test

      - name: Check formatting
        run: nix develop .#ci --command cargo fmt -- --check

      - name: Clippy
        run: nix develop .#ci --command cargo clippy --all-targets -- -D warnings

      - name: Security audit
        run: nix develop .#ci --command cargo audit

      - name: Dependency check
        run: nix develop .#ci --command cargo deny check
