[package]
name = "hyprwire"
version = "0.1.0"
edition = "2024"
description = "A fast and consistent wire protocol for IPC"
license = "BSD-3-Clause"
build = "examples/basic/build.rs"

[workspace]
members = ["scanner"]

[[example]]
name = "basic-client"
path = "examples/basic/client.rs"

[[example]]
name = "basic-server"
path = "examples/basic/server.rs"

[dependencies]
libffi = { version = "5.1.0", default-features = false }
log = { version = "0.4.29", default-features = false }
nix = { version = "0.31.1", features = [
  "poll",
  "socket",
  "uio",
], default-features = false }

[build-dependencies]
hyprwire-scanner = { path = "scanner" }

[dev-dependencies]
hyprwire-scanner = { path = "scanner" }
insta = "1"
env_logger = { version = "0.11.9", default-features = false }
